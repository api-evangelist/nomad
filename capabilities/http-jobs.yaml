naftiko: 1.0.0-alpha2
info:
  label: HashiCorp Nomad HTTP API — Jobs
  description: 'HashiCorp Nomad HTTP API — Jobs. 16 operations. Lead operation: Read a job. Self-contained Naftiko capability
    covering one Nomad business surface.'
  tags:
  - Nomad
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NOMAD_API_KEY: NOMAD_API_KEY
capability:
  consumes:
  - type: http
    namespace: http-jobs
    baseUri: http://localhost:4646/v1
    description: HashiCorp Nomad HTTP API — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: job-jobID
      path: /job/{jobID}
      operations:
      - name: readjob
        method: GET
        description: Read a job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deregisterjob
        method: DELETE
        description: Deregister a job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: purge
          in: query
          type: boolean
          description: If true, the job is purged from the system and cannot be recovered. Defaults to false.
        - name: global
          in: query
          type: boolean
          description: If true, deregisters the job in all federated regions.
    - name: job-jobID-allocations
      path: /job/{jobID}/allocations
      operations:
      - name: listjoballocations
        method: GET
        description: List allocations for a job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: all
          in: query
          type: boolean
          description: If true, includes allocations from all namespaces.
    - name: job-jobID-deployments
      path: /job/{jobID}/deployments
      operations:
      - name: listjobdeployments
        method: GET
        description: List deployments for a job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: job-jobID-dispatch
      path: /job/{jobID}/dispatch
      operations:
      - name: dispatchjob
        method: PUT
        description: Dispatch a parameterized job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: job-jobID-evaluate
      path: /job/{jobID}/evaluate
      operations:
      - name: evaluatejob
        method: PUT
        description: Create a new evaluation for a job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: job-jobID-evaluations
      path: /job/{jobID}/evaluations
      operations:
      - name: listjobevaluations
        method: GET
        description: List evaluations for a job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: job-jobID-plan
      path: /job/{jobID}/plan
      operations:
      - name: planjob
        method: PUT
        description: Plan a job update
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: job-jobID-revert
      path: /job/{jobID}/revert
      operations:
      - name: revertjob
        method: PUT
        description: Revert job to an older version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: job-jobID-stable
      path: /job/{jobID}/stable
      operations:
      - name: setjobstability
        method: PUT
        description: Set job stability
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: job-jobID-summary
      path: /job/{jobID}/summary
      operations:
      - name: readjobsummary
        method: GET
        description: Read a job summary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: job-jobID-versions
      path: /job/{jobID}/versions
      operations:
      - name: listjobversions
        method: GET
        description: List versions of a job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: diffs
          in: query
          type: boolean
          description: If true, includes the diff between consecutive job versions.
    - name: jobs
      path: /jobs
      operations:
      - name: listjobs
        method: GET
        description: List jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: registerjob
        method: PUT
        description: Register a new job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: jobs-parse
      path: /jobs/parse
      operations:
      - name: parsejob
        method: PUT
        description: Parse a job specification
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: jobs-statuses
      path: /jobs/statuses
      operations:
      - name: listjobstatuses
        method: GET
        description: List job statuses
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
