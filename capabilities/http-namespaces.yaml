naftiko: 1.0.0-alpha2
info:
  label: HashiCorp Nomad HTTP API — Namespaces
  description: 'HashiCorp Nomad HTTP API — Namespaces. 4 operations. Lead operation: Create or update a namespace. Self-contained
    Naftiko capability covering one Nomad business surface.'
  tags:
  - Nomad
  - Namespaces
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NOMAD_API_KEY: NOMAD_API_KEY
capability:
  consumes:
  - type: http
    namespace: http-namespaces
    baseUri: http://localhost:4646/v1
    description: HashiCorp Nomad HTTP API — Namespaces business capability. Self-contained, no shared references.
    resources:
    - name: namespace
      path: /namespace
      operations:
      - name: createnamespace
        method: PUT
        description: Create or update a namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: namespace-namespaceName
      path: /namespace/{namespaceName}
      operations:
      - name: readnamespace
        method: GET
        description: Read a namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          description: The name of the namespace.
          required: true
      - name: deletenamespace
        method: DELETE
        description: Delete a namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespaceName
          in: path
          type: string
          description: The name of the namespace.
          required: true
    - name: namespaces
      path: /namespaces
      operations:
      - name: listnamespaces
        method: GET
        description: List namespaces
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.NOMAD_API_KEY}}'
  exposes:
  - type: rest
    namespace: http-namespaces-rest
    port: 8080
    description: REST adapter for HashiCorp Nomad HTTP API — Namespaces. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/namespace
      name: namespace
      description: REST surface for namespace.
      operations:
      - method: PUT
        name: createnamespace
        description: Create or update a namespace
        call: http-namespaces.createnamespace
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/namespace/{namespacename}
      name: namespace-namespacename
      description: REST surface for namespace-namespaceName.
      operations:
      - method: GET
        name: readnamespace
        description: Read a namespace
        call: http-namespaces.readnamespace
        with:
          namespaceName: rest.namespaceName
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletenamespace
        description: Delete a namespace
        call: http-namespaces.deletenamespace
        with:
          namespaceName: rest.namespaceName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/namespaces
      name: namespaces
      description: REST surface for namespaces.
      operations:
      - method: GET
        name: listnamespaces
        description: List namespaces
        call: http-namespaces.listnamespaces
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: http-namespaces-mcp
    port: 9090
    transport: http
    description: MCP adapter for HashiCorp Nomad HTTP API — Namespaces. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-update-namespace
      description: Create or update a namespace
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: http-namespaces.createnamespace
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: read-namespace
      description: Read a namespace
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: http-namespaces.readnamespace
      with:
        namespaceName: tools.namespaceName
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-namespace
      description: Delete a namespace
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: http-namespaces.deletenamespace
      with:
        namespaceName: tools.namespaceName
      outputParameters:
      - type: object
        mapping: $.
    - name: list-namespaces
      description: List namespaces
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: http-namespaces.listnamespaces
      outputParameters:
      - type: object
        mapping: $.
