naftiko: 1.0.0-alpha2
info:
  label: HashiCorp Nomad HTTP API — Nodes
  description: 'HashiCorp Nomad HTTP API — Nodes. 5 operations. Lead operation: Read a node. Self-contained Naftiko capability
    covering one Nomad business surface.'
  tags:
  - Nomad
  - Nodes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NOMAD_API_KEY: NOMAD_API_KEY
capability:
  consumes:
  - type: http
    namespace: http-nodes
    baseUri: http://localhost:4646/v1
    description: HashiCorp Nomad HTTP API — Nodes business capability. Self-contained, no shared references.
    resources:
    - name: node-nodeID
      path: /node/{nodeID}
      operations:
      - name: readnode
        method: GET
        description: Read a node
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: node-nodeID-drain
      path: /node/{nodeID}/drain
      operations:
      - name: drainnode
        method: POST
        description: Set node drain mode
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: node-nodeID-evaluate
      path: /node/{nodeID}/evaluate
      operations:
      - name: evaluatenode
        method: PUT
        description: Create a new evaluation for a node
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: node-nodeID-purge
      path: /node/{nodeID}/purge
      operations:
      - name: purgenode
        method: DELETE
        description: Purge a node
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: nodes
      path: /nodes
      operations:
      - name: listnodes
        method: GET
        description: List nodes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.NOMAD_API_KEY}}'
  exposes:
  - type: rest
    namespace: http-nodes-rest
    port: 8080
    description: REST adapter for HashiCorp Nomad HTTP API — Nodes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/node/{nodeid}
      name: node-nodeid
      description: REST surface for node-nodeID.
      operations:
      - method: GET
        name: readnode
        description: Read a node
        call: http-nodes.readnode
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/node/{nodeid}/drain
      name: node-nodeid-drain
      description: REST surface for node-nodeID-drain.
      operations:
      - method: POST
        name: drainnode
        description: Set node drain mode
        call: http-nodes.drainnode
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/node/{nodeid}/evaluate
      name: node-nodeid-evaluate
      description: REST surface for node-nodeID-evaluate.
      operations:
      - method: PUT
        name: evaluatenode
        description: Create a new evaluation for a node
        call: http-nodes.evaluatenode
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/node/{nodeid}/purge
      name: node-nodeid-purge
      description: REST surface for node-nodeID-purge.
      operations:
      - method: DELETE
        name: purgenode
        description: Purge a node
        call: http-nodes.purgenode
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/nodes
      name: nodes
      description: REST surface for nodes.
      operations:
      - method: GET
        name: listnodes
        description: List nodes
        call: http-nodes.listnodes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: http-nodes-mcp
    port: 9090
    transport: http
    description: MCP adapter for HashiCorp Nomad HTTP API — Nodes. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: read-node
      description: Read a node
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: http-nodes.readnode
      outputParameters:
      - type: object
        mapping: $.
    - name: set-node-drain-mode
      description: Set node drain mode
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: http-nodes.drainnode
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-evaluation-node
      description: Create a new evaluation for a node
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: http-nodes.evaluatenode
      outputParameters:
      - type: object
        mapping: $.
    - name: purge-node
      description: Purge a node
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: http-nodes.purgenode
      outputParameters:
      - type: object
        mapping: $.
    - name: list-nodes
      description: List nodes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: http-nodes.listnodes
      outputParameters:
      - type: object
        mapping: $.
