naftiko: 1.0.0-alpha2
info:
  label: HashiCorp Nomad HTTP API — Node Pools
  description: 'HashiCorp Nomad HTTP API — Node Pools. 4 operations. Lead operation: Read a node pool. Self-contained Naftiko
    capability covering one Nomad business surface.'
  tags:
  - Nomad
  - Node Pools
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NOMAD_API_KEY: NOMAD_API_KEY
capability:
  consumes:
  - type: http
    namespace: http-node-pools
    baseUri: http://localhost:4646/v1
    description: HashiCorp Nomad HTTP API — Node Pools business capability. Self-contained, no shared references.
    resources:
    - name: node-pool-poolName
      path: /node/pool/{poolName}
      operations:
      - name: readnodepool
        method: GET
        description: Read a node pool
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: poolName
          in: path
          type: string
          description: The name of the node pool.
          required: true
      - name: deletenodepool
        method: DELETE
        description: Delete a node pool
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: poolName
          in: path
          type: string
          description: The name of the node pool.
          required: true
    - name: node-pools
      path: /node/pools
      operations:
      - name: listnodepools
        method: GET
        description: List node pools
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createnodepool
        method: PUT
        description: Create or update a node pool
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.NOMAD_API_KEY}}'
  exposes:
  - type: rest
    namespace: http-node-pools-rest
    port: 8080
    description: REST adapter for HashiCorp Nomad HTTP API — Node Pools. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/node/pool/{poolname}
      name: node-pool-poolname
      description: REST surface for node-pool-poolName.
      operations:
      - method: GET
        name: readnodepool
        description: Read a node pool
        call: http-node-pools.readnodepool
        with:
          poolName: rest.poolName
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletenodepool
        description: Delete a node pool
        call: http-node-pools.deletenodepool
        with:
          poolName: rest.poolName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/node/pools
      name: node-pools
      description: REST surface for node-pools.
      operations:
      - method: GET
        name: listnodepools
        description: List node pools
        call: http-node-pools.listnodepools
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: createnodepool
        description: Create or update a node pool
        call: http-node-pools.createnodepool
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: http-node-pools-mcp
    port: 9090
    transport: http
    description: MCP adapter for HashiCorp Nomad HTTP API — Node Pools. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: read-node-pool
      description: Read a node pool
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: http-node-pools.readnodepool
      with:
        poolName: tools.poolName
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-node-pool
      description: Delete a node pool
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: http-node-pools.deletenodepool
      with:
        poolName: tools.poolName
      outputParameters:
      - type: object
        mapping: $.
    - name: list-node-pools
      description: List node pools
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: http-node-pools.listnodepools
      outputParameters:
      - type: object
        mapping: $.
    - name: create-update-node-pool
      description: Create or update a node pool
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: http-node-pools.createnodepool
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
