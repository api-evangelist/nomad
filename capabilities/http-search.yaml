naftiko: 1.0.0-alpha2
info:
  label: HashiCorp Nomad HTTP API — Search
  description: 'HashiCorp Nomad HTTP API — Search. 2 operations. Lead operation: Prefix search. Self-contained Naftiko capability
    covering one Nomad business surface.'
  tags:
  - Nomad
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NOMAD_API_KEY: NOMAD_API_KEY
capability:
  consumes:
  - type: http
    namespace: http-search
    baseUri: http://localhost:4646/v1
    description: HashiCorp Nomad HTTP API — Search business capability. Self-contained, no shared references.
    resources:
    - name: search
      path: /search
      operations:
      - name: prefixsearch
        method: POST
        description: Prefix search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: search-fuzzy
      path: /search/fuzzy
      operations:
      - name: fuzzysearch
        method: POST
        description: Fuzzy search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.NOMAD_API_KEY}}'
  exposes:
  - type: rest
    namespace: http-search-rest
    port: 8080
    description: REST adapter for HashiCorp Nomad HTTP API — Search. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/search
      name: search
      description: REST surface for search.
      operations:
      - method: POST
        name: prefixsearch
        description: Prefix search
        call: http-search.prefixsearch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/fuzzy
      name: search-fuzzy
      description: REST surface for search-fuzzy.
      operations:
      - method: POST
        name: fuzzysearch
        description: Fuzzy search
        call: http-search.fuzzysearch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: http-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for HashiCorp Nomad HTTP API — Search. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: prefix-search
      description: Prefix search
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: http-search.prefixsearch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fuzzy-search
      description: Fuzzy search
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: http-search.fuzzysearch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
