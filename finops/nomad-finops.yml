meters:
  - name: nomad_enterprise_clusters
    description: Licensed Nomad Enterprise clusters under contract.
    unit: cluster-month
    aggregation: avg
    dimensions:
      - environment
      - region
  - name: nomad_enterprise_nodes
    description: Nomad Enterprise client/server nodes counted against license.
    unit: node-month
    aggregation: avg
    dimensions:
      - region
      - tier
  - name: hcp_nomad_payg
    description: HCP Nomad managed-service consumption via IBM PAYG.
    unit: hour
    aggregation: sum
    dimensions:
      - region
      - sku
  - name: support_subscription
    description: HashiCorp / IBM enterprise support tier subscription.
    unit: month
    aggregation: sum
    dimensions:
      - tier
principles:
  - name: Visibility
    description: Use Nomad's metrics API (Prometheus exposition) for scheduler and allocation utilization;
      use HashiCorp Cloud Platform billing dashboard or IBM PAYG console for managed billing.
  - name: Allocation
    description: Use namespaces (Enterprise) to attribute scheduler and node consumption per team; tag
      jobs with cost-center metadata; map clusters to business units.
  - name: Optimization
    description: Use bin-packing scheduler placement constraints to maximize node utilization; set resource
      `cpu` / `memory` requests accurately; consolidate Community workloads where governance allows;
      retire idle Enterprise nodes before renewal.
  - name: Accountability
    description: Assign per-namespace owners for spend; review quarterly cluster headcount vs. node license
      utilization; reconcile HCP Nomad PAYG charges against capacity-planning forecasts.
maintainers:
