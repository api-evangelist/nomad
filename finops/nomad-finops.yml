notes: HashiCorp / IBM does not publish public Nomad-specific PAYG rates; FinOps shape captured here
  follows the documented HashiCorp pricing patterns (Community free, Enterprise contracted, HCP PAYG/Flex).
  Reconcile against the IBM HashiCorp Cloud Platform pricing table or customer ELA quote.
description: 'FOCUS-aligned FinOps for HashiCorp Nomad: Community Edition is free; Enterprise is contracted
  per-resource / per-cluster; HCP Nomad bills via IBM PAYG or HashiCorp Flex multi-year plans.'
