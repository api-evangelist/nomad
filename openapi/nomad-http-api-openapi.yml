            The name of the node to force leave.
          schema:
            type: string
      responses:
        '200':
          description: Agent forced to leave
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /agent/health:
    get:
      operationId: readAgentHealth
      summary: Read agent health
      description: >-
        Returns the health status of the agent.
      tags:
        - Agent
      responses:
        '200':
          description: Agent is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  client:
                    type: object
                    properties:
                      ok:
                        type: boolean
                      message:
                        type: string
                  server:
                    type: object
                    properties:
                      ok:
                        type: boolean
                      message:
                        type: string
        '429':
          description: Agent is unhealthy
        '500':
          $ref: '#/components/responses/InternalError'
  /vars:
    get:
      operationId: listVariables
      summary: List variables
      description: >-
        Lists all Nomad variables. Variables are encrypted key-value
        pairs stored in Nomad.
      tags:
        - Variables
      parameters:
        - $ref: '#/components/parameters/PrefixParam'
        - $ref: '#/components/parameters/NamespaceParam'
        - $ref: '#/components/parameters/NextTokenParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: A list of variable metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VariableMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /var/{variablePath}:
    get:
      operationId: readVariable
      summary: Read a variable
      description: >-
        Returns the full variable including its items at the specified
        path.
      tags:
        - Variables
      parameters:
        - name: variablePath
          in: path
          required: true
          description: >-
            The path of the variable.
          schema:
            type: string
        - $ref: '#/components/parameters/NamespaceParam'
      responses:
        '200':
          description: Variable details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Variable'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      operationId: upsertVariable
      summary: Create or update a variable
      description: >-
        Creates a new variable or updates an existing one at the
        specified path.
      tags:
        - Variables
      parameters:
        - name: variablePath
          in: path
          required: true
          description: >-
            The path of the variable.
          schema:
            type: string
        - $ref: '#/components/parameters/NamespaceParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Variable'
      responses:
        '200':
          description: Variable created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Variable'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      operationId: deleteVariable
      summary: Delete a variable
      description: >-
        Deletes the variable at the specified path.
      tags:
        - Variables
      parameters:
        - name: variablePath
          in: path
          required: true
          description: >-
            The path of the variable.
          schema:
            type: string
        - $ref: '#/components/parameters/NamespaceParam'
      responses:
        '200':
          description: Variable deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /scaling/policies:
    get:
      operationId: listScalingPolicies
      summary: List scaling policies
      description: >-
        Lists all scaling policies in the system.
      tags:
        - Scaling
      parameters:
        - $ref: '#/components/parameters/NamespaceParam'
        - $ref: '#/components/parameters/NextTokenParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: job
          in: query
          description: >-
            Filter scaling policies by job ID.
          schema:
            type: string
        - name: type
          in: query
          description: >-
            Filter scaling policies by type.
          schema:
            type: string
      responses:
        '200':
          description: A list of scaling policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScalingPolicyListStub'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /scaling/policy/{policyID}:
    get:
      operationId: readScalingPolicy
      summary: Read a scaling policy
      description: >-
        Returns the details of the specified scaling policy.
      tags:
        - Scaling
      parameters:
        - name: policyID
          in: path
          required: true
          description: >-
            The ID of the scaling policy.
          schema:
            type: string
      responses:
        '200':
          description: Scaling policy details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScalingPolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /search:
    post:
      operationId: prefixSearch
      summary: Prefix search
      description: >-
        Searches for objects by prefix match across multiple object types.
      tags:
        - Search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - Prefix
                - Context
              properties:
                Prefix:
                  type: string
                  description: >-
                    The prefix to search for.
                Context:
                  type: string
                  description: >-
                    The context to search within (jobs, evals, allocs,
                    nodes, deployment, plugins, namespaces, volumes).
                  enum:
                    - jobs
                    - evals
                    - allocs
                    - nodes
                    - deployment
                    - plugins
                    - namespaces
                    - volumes
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  Matches:
                    type: object
                  Truncations:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /search/fuzzy:
    post:
      operationId: fuzzySearch
      summary: Fuzzy search
      description: >-
        Performs a fuzzy search across Nomad objects by text match.
      tags:
        - Search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - Text
                - Context
              properties:
                Text:
                  type: string
                  description: >-
                    The text to search for.
                Context:
                  type: string
                  description: >-
                    The context to search within.
      responses:
        '200':
          description: Fuzzy search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  Matches:
                    type: object
                  Truncations:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /system/gc:
    put:
      operationId: systemGarbageCollect
      summary: Run garbage collection
      description: >-
        Initiates garbage collection of jobs, evaluations, allocations,
        and nodes. This should not be necessary for most users.
      tags:
        - System
      responses:
        '200':
          description: Garbage collection initiated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /system/reconcile/summaries:
    put:
      operationId: reconcileSummaries
      summary: Reconcile job summaries
      description: >-
        Reconciles the summaries of all registered jobs.
      tags:
        - System
      responses:
        '200':
          description: Reconciliation initiated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /operator/raft/configuration:
    get:
      operationId: readRaftConfiguration
      summary: Read Raft configuration
      description: >-
        Returns the current Raft peer configuration of the cluster.
      tags:
        - Operator
      responses:
        '200':
          description: Raft configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  Servers:
                    type: array
                    items:
                      type: object
                      properties:
                        ID:
                          type: string
                        Node:
                          type: string
                        Address:
                          type: string
                        Leader:
                          type: boolean
                        Voter:
                          type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /operator/raft/peer:
    delete:
      operationId: removeRaftPeer
      summary: Remove a Raft peer
      description: >-
        Removes a Raft peer from the cluster. This is useful when a server
        has permanently failed and will not be returning.
      tags:
        - Operator
      parameters:
        - name: address
          in: query
          description: >-
            The address of the peer to remove.
          schema:
            type: string
        - name: id
          in: query
          description: >-
            The ID of the peer to remove.
          schema:
            type: string
      responses:
        '200':
          description: Peer removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /operator/autopilot/configuration:
    get:
      operationId: readAutopilotConfiguration
      summary: Read autopilot configuration
      description: >-
        Returns the current autopilot configuration.
      tags:
        - Operator
      responses:
        '200':
          description: Autopilot configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  CleanupDeadServers:
                    type: boolean
                  LastContactThreshold:
                    type: string
                  MaxTrailingLogs:
                    type: integer
                  ServerStabilizationTime:
                    type: string
                  EnableRedundancyZones:
                    type: boolean
                  DisableUpgradeMigration:
                    type: boolean
                  EnableCustomUpgrades:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      operationId: updateAutopilotConfiguration
      summary: Update autopilot configuration
      description: >-
        Updates the autopilot configuration.
      tags:
        - Operator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CleanupDeadServers:
                  type: boolean
                LastContactThreshold:
                  type: string
                MaxTrailingLogs:
                  type: integer
                ServerStabilizationTime:
                  type: string
      responses:
        '200':
          description: Configuration updated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /operator/autopilot/health:
    get:
      operationId: readAutopilotHealth
      summary: Read autopilot health
      description: >-
        Returns the health status of the cluster as determined by the
        autopilot.
      tags:
        - Operator
      responses:
        '200':
          description: Cluster health
          content:
            application/json:
              schema:
                type: object
                properties:
                  Healthy:
                    type: boolean
                  FailureTolerance:
                    type: integer
                  Servers:
                    type: array
                    items:
                      type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /regions:
    get:
      operationId: listRegions
      summary: List regions
      description: >-
        Returns a list of all known regions in the Nomad cluster.
      tags:
        - Regions
      responses:
        '200':
          description: A list of region names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '500':
          $ref: '#/components/responses/InternalError'
  /status/leader:
    get:
      operationId: readLeader
      summary: Read cluster leader
      description: >-
        Returns the address of the current cluster leader.
      tags:
        - Status
      responses:
        '200':
          description: Leader address
          content:
            application/json:
              schema:
                type: string
        '500':
          $ref: '#/components/responses/InternalError'
  /status/peers:
    get:
      operationId: listPeers
      summary: List cluster peers
      description: >-
        Returns the addresses of the current cluster peers (Raft servers).
      tags:
        - Status
      responses:
        '200':
          description: Peer addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    nomadToken:
      type: apiKey
      name: X-Nomad-Token
      in: header
      description: >-
        ACL token passed via the X-Nomad-Token request header.
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        ACL token passed via the Authorization header with Bearer scheme.
  headers:
    NomadIndex:
      description: >-
        The internal index value that represents the current state of the
        requested resource.
      schema:
        type: integer
    NomadKnownLeader:
      description: >-
        Indicates if there is a known cluster leader.
      schema:
        type: boolean
    NomadLastContact:
      description: >-
        The time in milliseconds that a server was last contacted by the
        leader node.
      schema:
        type: integer
  parameters:
    PrefixParam:
      name: prefix
      in: query
      description: >-
        Specifies a string to filter results based on an ID prefix.
      schema:
        type: string
    NamespaceParam:
      name: namespace
      in: query
      description: >-
        The target namespace. Defaults to the default namespace.
      schema:
        type: string
    NextTokenParam:
      name: next_token
      in: query
      description: >-
        Indicates where to start paging for queries that support
        pagination.
      schema:
        type: string
    PerPageParam:
      name: per_page
      in: query
      description: >-
        Maximum number of results to return per page.
      schema:
        type: integer
    FilterParam:
      name: filter
      in: query
      description: >-
        Specifies the expression used to filter the results.
      schema:
        type: string
    JobIDParam:
      name: jobID
      in: path
      required: true
      description: >-
        The ID of the job.
      schema:
        type: string
    AllocIDParam:
      name: allocID
      in: path
      required: true
      description: >-
        The ID of the allocation.
      schema:
        type: string
    EvalIDParam:
      name: evalID
      in: path
      required: true
      description: >-
        The ID of the evaluation.
      schema:
        type: string
    DeploymentIDParam:
      name: deploymentID
      in: path
      required: true
      description: >-
        The ID of the deployment.
      schema:
        type: string
    NodeIDParam:
      name: nodeID
      in: path
      required: true
      description: >-
        The ID of the node.
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    Unauthorized:
      description: Unauthorized - missing or invalid ACL token
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
  schemas:
    Job:
      type: object
      description: >-
        A Nomad job specification defining the workload to be scheduled.
      properties:
        ID:
          type: string
          description: >-
            The unique identifier of the job.
        Name:
          type: string
          description: >-
            The human-readable name of the job.
        Namespace:
          type: string
          description: >-
            The namespace the job is registered in.
        Type:
          type: string
          description: >-
            The type of job (service, batch, system, sysbatch).
          enum:
            - service
            - batch
            - system
            - sysbatch
        Priority:
          type: integer
          description: >-
            The priority of the job, from 1 to 100.
          minimum: 1
          maximum: 100
        Region:
          type: string
          description: >-
            The region in which the job is registered.
        Datacenters:
          type: array
          items:
            type: string
          description: >-
            A list of datacenters the job is allowed to run in.
        NodePool:
          type: string
          description: >-
            The node pool the job should be scheduled in.
        Status:
          type: string
          description: >-
            The current status of the job.
          enum:
            - pending
            - running
            - dead
        StatusDescription:
          type: string
          description: >-
            Human-readable description of the current status.
        Stable:
          type: boolean
          description: >-
            Whether the job version is marked as stable.
        Version:
          type: integer
          description: >-
            The version number of the job.
        SubmitTime:
          type: integer
          format: int64
          description: >-
            The time the job was submitted in nanoseconds since epoch.
        CreateIndex:
          type: integer
          description: >-
            The Raft index at which the job was created.
        ModifyIndex:
          type: integer
          description: >-
            The Raft index at which the job was last modified.
        JobModifyIndex:
          type: integer
          description: >-
            The Raft index at which the job definition was last modified.
        TaskGroups:
          type: array
          items:
            $ref: '#/components/schemas/TaskGroup'
          description: >-
            A list of task groups that make up the job.
        Update:
          $ref: '#/components/schemas/UpdateStrategy'
        Periodic:
          type: object
          description: >-
            Periodic configuration for the job if it is a periodic job.
          properties:
            Enabled:
              type: boolean
            Spec:
              type: string
            SpecType:
              type: string
            ProhibitOverlap:
              type: boolean
            TimeZone:
              type: string
        Parameterized:
          type: object
          description: >-
            Configuration for parameterized dispatch jobs.
          properties:
            Payload:
              type: string
              enum:
                - optional
                - required
                - forbidden
            MetaRequired:
              type: array
              items:
                type: string
            MetaOptional:
              type: array
              items:
                type: string
        Meta:
          type: object
          additionalProperties:
            type: string
          description: >-
            Metadata key-value pairs associated with the job.
        ConsulToken:
          type: string
          description: >-
            Consul token for the job.
        VaultToken:
          type: string
          description: >-
            Vault token for the job.
    TaskGroup:
      type: object
      description: >-
        A task group is a set of tasks that must be co-located on the
        same node.
      properties:
        Name:
          type: string
          description: >-
            The name of the task group.
        Count:
          type: integer
          description: >-
            The number of instances of this task group to run.
        Tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
          description: >-
            The tasks that are part of this task group.
        RestartPolicy:
          type: object
          properties:
            Interval:
              type: integer
            Attempts:
              type: integer
            Delay:
              type: integer
            Mode:
              type: string
        EphemeralDisk:
          type: object
          properties:
            SizeMB:
              type: integer
            Sticky:
              type: boolean
            Migrate:
              type: boolean
        Networks:
          type: array
          items:
            $ref: '#/components/schemas/NetworkResource'
        Services:
          type: array
          items:
            $ref: '#/components/schemas/Service'
        Volumes:
          type: object
          additionalProperties:
            type: object
        Update:
          $ref: '#/components/schemas/UpdateStrategy'
        Scaling:
          type: object
          description: >-
            Scaling policy for the task group.
    Task:
      type: object
      description: >-
        A task is the smallest unit of work in Nomad, executed within
        a task group.
      properties:
        Name:
          type: string
          description: >-
            The name of the task.
        Driver:
          type: string
          description: >-
            The task driver to use (e.g., docker, exec, raw_exec, java).
        Config:
          type: object
          additionalProperties: true
          description: >-
            Driver-specific configuration for the task.
        Env:
          type: object
          additionalProperties:
            type: string
          description: >-
            Environment variables for the task.
        Resources:
          $ref: '#/components/schemas/Resources'
        Meta:
          type: object
          additionalProperties:
            type: string
        LogConfig:
          type: object
          properties:
            MaxFiles:
              type: integer
            MaxFileSizeMB:
              type: integer
        Templates:
          type: array
          items:
            type: object
        Artifacts:
          type: array
          items:
            type: object
        Leader:
          type: boolean
          description: >-
            If true, this task is the leader task of the group.
    Resources:
      type: object
      description: >-
        Resource requirements for a task.
      properties:
        CPU:
          type: integer
          description: >-
            CPU required in MHz.
        Cores:
          type: integer
          description: >-
            Number of CPU cores required.
        MemoryMB:
          type: integer
          description: >-
            Memory required in MB.
        MemoryMaxMB:
          type: integer
          description: >-
            Maximum memory in MB (memory oversubscription).
        DiskMB:
          type: integer
          description: >-
            Disk space required in MB.
        Networks:
          type: array
          items:
            $ref: '#/components/schemas/NetworkResource'
    NetworkResource:
      type: object
      description: >-
        Network resource configuration.
      properties:
        Mode:
          type: string
          description: >-
            The network mode (bridge, host, cni).
        Device:
          type: string
        CIDR:
          type: string
        IP:
          type: string
        MBits:
          type: integer
        DNS:
          type: object
          properties:
            Servers:
              type: array
              items:
                type: string
        DynamicPorts:
          type: array
          items:
            type: object
            properties:
              Label:
                type: string
              Value:
                type: integer
              To:
                type: integer
              HostNetwork:
                type: string
        ReservedPorts:
          type: array
          items:
            type: object
            properties:
              Label:
                type: string
              Value:
                type: integer
              To:
                type: integer
              HostNetwork:
                type: string
    Service:
      type: object
      description: >-
        A service registration for Consul or Nomad service discovery.
      properties:
        Name:
          type: string
          description: >-
            The name of the service.
        Tags:
          type: array
          items:
            type: string
        CanaryTags:
          type: array
          items:
            type: string
        PortLabel:
          type: string
        Provider:
          type: string
          description: >-
            The service discovery provider (consul or nomad).
          enum:
            - consul
            - nomad
        Checks:
          type: array
          items:
            type: object
    UpdateStrategy:
      type: object
      description: >-
        Update strategy configuration for rolling deployments.
      properties:
        MaxParallel:
          type: integer
          description: >-
            The maximum number of allocations to update at a time.
        HealthCheck:
          type: string
          description: >-
            The type of health check to use.
          enum:
            - checks
            - task_states
            - manual
        MinHealthyTime:
          type: integer
          description: >-
            Minimum time in nanoseconds an allocation must be healthy.
        HealthyDeadline:
          type: integer
          description: >-
            Deadline in nanoseconds for an allocation to become healthy.
        ProgressDeadline:
          type: integer
          description: >-
            Deadline in nanoseconds for the deployment to make progress.
        AutoRevert:
          type: boolean
          description: >-
            If true, automatically reverts to the last stable version
            on deployment failure.
        AutoPromote:
