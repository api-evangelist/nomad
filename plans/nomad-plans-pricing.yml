specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: HashiCorp Nomad
providerId: nomad
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Workload Orchestration
  - Container Orchestration
  - Scheduling
  - DevOps
  - Infrastructure
notes: HashiCorp does not publish per-resource public pricing for Nomad Enterprise on its general pricing
  page (which focuses on Terraform tiers). HCP / IBM-PAYG offers Pay-as-You-Go and Flex multi-year plans
  for HashiCorp products including Nomad; specific Nomad rates are obtained via sales quote or the IBM
  HashiCorp Cloud Platform pricing table. Nomad Community Edition is free under MPL 2.0.
description: HashiCorp Nomad has two licensed tiers — Community (free, MPL 2.0) and Enterprise (commercial)
  — plus HCP Nomad managed offerings via the IBM HashiCorp Cloud Platform. Public pricing for Nomad
  Enterprise and HCP Nomad is not posted at per-SKU granularity; customers receive quotes via HashiCorp
  sales or transact via the IBM PAYG pricing table.
sources:
  - https://www.hashicorp.com/pricing
  - https://developer.hashicorp.com/nomad
plans:
  - id: nomad-community
    name: Nomad Community Edition
    type: freemium
    description: Free open-source workload orchestrator under MPL 2.0.
    entries:
      - label: Self-hosted Community
        name: nomad_community
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: HTTP API
      - name: CLI / SDKs
      - name: Job scheduling and allocation management
      - name: Multi-region federation
      - name: Community support
  - id: nomad-enterprise
    name: Nomad Enterprise
    type: enterprise
    description: Commercial Nomad with governance, multi-tenancy, autoscaling, and 24/7 support.
    entries:
      - label: Enterprise contract
        name: nomad_enterprise_contract
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact HashiCorp sales
        userMultiplied: false
    elements:
      - name: Sentinel governance
      - name: Namespaces / multi-tenancy
      - name: Audit logging
      - name: Multi-cluster deployments
      - name: Dynamic application sizing
      - name: 24/7 enterprise support
  - id: nomad-hcp
    name: HCP Nomad / IBM PAYG
    type: usage-based
    description: HashiCorp Cloud Platform managed Nomad offerings, transacted via IBM PAYG pricing table
      or HashiCorp Flex multi-year plans.
    entries:
      - label: PAYG / Flex
        name: hcp_nomad_payg
        type: metered
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see IBM PAYG pricing table
        userMultiplied: false
    elements:
      - name: Pay-as-you-go (usage-based)
      - name: Flex multi-year plans
      - name: Enterprise self-managed option
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
