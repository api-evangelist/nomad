- aid: nomad:go-sdk
  name: HashiCorp Nomad Go SDK
  description: The HashiCorp Nomad Go SDK is the official Go client library for interacting with the Nomad HTTP API. It provides
    a high-level, idiomatic Go interface for managing jobs, allocations, nodes, deployments, evaluations, and other Nomad
    resources. The SDK is maintained by HashiCorp as part of the main Nomad repository and is used internally by the Nomad
    CLI itself, making it the most comprehensive and up-to-date client available.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://pkg.go.dev/github.com/hashicorp/nomad/api
  tags:
  - Workload Orchestration
  - Go
  - SDK
  - DevOps
  properties:
  - type: Documentation
    url: https://pkg.go.dev/github.com/hashicorp/nomad/api
- aid: nomad:python-sdk
  name: HashiCorp Nomad Python SDK
  description: The python-nomad library is a Python client for the HashiCorp Nomad HTTP API. It provides Pythonic access to
    Nomad resources including jobs, nodes, allocations, deployments, evaluations, namespaces, and ACL management. The library
    supports configuration via environment variables such as NOMAD_ADDR, NOMAD_TOKEN, and NOMAD_NAMESPACE for consistency
    with the Nomad CLI and other ecosystem tools.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://github.com/jrxFive/python-nomad
  tags:
  - Workload Orchestration
  - Python
  - SDK
  - DevOps
  properties:
  - type: Documentation
    url: https://github.com/jrxFive/python-nomad
- aid: nomad:java-sdk
  name: HashiCorp Nomad Java SDK
  description: The Nomad Java SDK is an official Java client library for the HashiCorp Nomad HTTP API. It enables Java and
    JVM-based applications to interact with Nomad clusters for submitting jobs, querying allocations, managing nodes, and
    performing other orchestration operations. The SDK provides a typed Java interface over the Nomad REST API, making it
    suitable for enterprise applications and microservice architectures running on the JVM.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://developer.hashicorp.com/nomad/api-docs/libraries-and-sdks
  tags:
