aid: nomad
url: https://raw.githubusercontent.com/api-evangelist/nomad/refs/heads/main/apis.yml
modified: '2026-03-20'
common:
  - type: JSON-LD
    url: json-ld/nomad-context.jsonld
apis:
  - aid: nomad:http-api
    name: HashiCorp Nomad HTTP API
    tags:
      - Workload Orchestration
      - Container Orchestration
      - Scheduling
      - Infrastructure
      - DevOps
      - Cloud
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: http://localhost:4646
    humanURL: https://developer.hashicorp.com/nomad/api-docs
    properties:
      - url: https://developer.hashicorp.com/nomad/api-docs
        type: Documentation
      - url: openapi/nomad-http-api-openapi.yml
        type: OpenAPI
      - url: asyncapi/nomad-event-stream-asyncapi.yml
        type: AsyncAPI
      - url: json-schema/nomad-job-schema.json
        type: JSONSchema
    description: >-
      The HashiCorp Nomad HTTP API provides programmatic access to all Nomad
      functionality including job scheduling, allocation management, node
      operations, deployments, services, evaluations, namespaces, ACL policies,
      and cluster status. All API routes are prefixed with /v1/ and the default
      port is 4646. The API is RESTful, responds to standard HTTP verbs, and
      supports ACL token authentication via the X-Nomad-Token header or Bearer
      scheme. Developers can use this API to submit and manage workloads,
      monitor cluster health, query allocation status, and integrate Nomad
      orchestration into their infrastructure automation workflows.
  - aid: nomad:go-sdk
    name: HashiCorp Nomad Go SDK
    tags:
      - Workload Orchestration
      - Go
      - SDK
      - DevOps
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://pkg.go.dev/github.com/hashicorp/nomad/api
    properties:
      - url: https://pkg.go.dev/github.com/hashicorp/nomad/api
        type: Documentation
    description: >-
      The HashiCorp Nomad Go SDK is the official Go client library for
      interacting with the Nomad HTTP API. It provides a high-level,
      idiomatic Go interface for managing jobs, allocations, nodes,
      deployments, evaluations, and other Nomad resources. The SDK is
      maintained by HashiCorp as part of the main Nomad repository and is
      used internally by the Nomad CLI itself, making it the most
      comprehensive and up-to-date client available.
  - aid: nomad:python-sdk
    name: HashiCorp Nomad Python SDK
    tags:
      - Workload Orchestration
      - Python
      - SDK
      - DevOps
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://github.com/jrxFive/python-nomad
    properties:
      - url: https://github.com/jrxFive/python-nomad
        type: Documentation
    description: >-
      The python-nomad library is a Python client for the HashiCorp Nomad
      HTTP API. It provides Pythonic access to Nomad resources including
      jobs, nodes, allocations, deployments, evaluations, namespaces, and
      ACL management. The library supports configuration via environment
      variables such as NOMAD_ADDR, NOMAD_TOKEN, and NOMAD_NAMESPACE for
      consistency with the Nomad CLI and other ecosystem tools.
  - aid: nomad:java-sdk
    name: HashiCorp Nomad Java SDK
    tags:
      - Workload Orchestration
      - Java
      - SDK
      - DevOps
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://developer.hashicorp.com/nomad/api-docs/libraries-and-sdks
    properties:
      - url: https://developer.hashicorp.com/nomad/api-docs/libraries-and-sdks
        type: Documentation
    description: >-
      The Nomad Java SDK is an official Java client library for the
      HashiCorp Nomad HTTP API. It enables Java and JVM-based applications
      to interact with Nomad clusters for submitting jobs, querying
      allocations, managing nodes, and performing other orchestration
      operations. The SDK provides a typed Java interface over the Nomad
      REST API, making it suitable for enterprise applications and
      microservice architectures running on the JVM.
