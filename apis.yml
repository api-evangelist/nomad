apis:
- aid: nomad:http-api
  name: HashiCorp Nomad HTTP API
  description: The HashiCorp Nomad HTTP API provides programmatic access to all Nomad functionality including job scheduling,
    allocation management, node operations, deployments, services, evaluations, namespaces, ACL policies, and cluster status.
    All API routes are prefixed with /v1/ and the default port is 4646. The API is RESTful, responds to standard HTTP verbs,
    and supports ACL token authentication via the X-Nomad-Token header or Bearer scheme. Developers can use this API to submit
    and manage workloads, monitor cluster health, query allocation status, and integrate Nomad orchestration into their infrastructure
    automation workflows.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://developer.hashicorp.com/nomad/api-docs
  baseURL: http://localhost:4646
  tags:
