aid: nomad
name: HashiCorp Nomad
description: HashiCorp Nomad is a flexible workload orchestrator that enables organizations to deploy and manage containers,
  legacy applications, and batch jobs across any infrastructure. The Nomad developer platform provides a comprehensive HTTP
  API, official SDKs, and tooling for automating job scheduling, cluster management, and service orchestration at scale.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/nomad/refs/heads/main/apis.yml
